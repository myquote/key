<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Kesayanganku ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fce3e3, #ffc4c4);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        .photo-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #ff8585;
            box-shadow: 0 5px 15px rgba(255, 133, 133, 0.4);
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #e63946;
            font-size: 2.5em;
            margin: 10px 0;
        }

        p {
            color: #555;
            line-height: 1.6;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .btn {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
        }

        .btn:hover {
            background-color: #e63946;
            transform: scale(1.05);
        }

        #secretMessage {
            display: none;
            margin-top: 20px;
            font-weight: 600;
            color: #e63946;
            animation: fadeIn 1s ease-in;
        }

        /* Animasi Hati Jatuh */
        .heart {
            position: absolute;
            top: -10vh;
            font-size: 1.5rem;
            animation: fall linear forwards;
            z-index: 1;
            opacity: 0.7;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="photo-container">
            <img src="https://raw.githubusercontent.com/myquote/key/refs/heads/main/IMG_20260520_031110_441.png" alt="Foto Pacarku yang Cantik">
        </div>
        <h1>Pagi, Kesayanganku</h1>
        <p>Setiap kali aku melihat foto ini dan senyum manismu, aku selalu sadar betapa beruntungnya aku memilikimu. Terima kasih sudah selalu menjadi alasan bahagiaku setiap hari.</p>
        
        <button class="btn" onclick="revealMessage()">Klik untuk pesan rahasia 💌</button>
        
        <div id="secretMessage">
            Aku sayang banget sama kamu! ❤️<br>Selamanya dan selalu.
        </div>
    </div>

    <script>
        // Fungsi untuk menampilkan pesan rahasia
        function revealMessage() {
            document.getElementById('secretMessage').style.display = 'block';
            document.querySelector('.btn').style.display = 'none';
        }

        // Fungsi untuk membuat hujan hati (falling hearts)
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Emoji hati bisa diganti atau divariasikan
            const heartsArr = ['❤️', '💖', '💕', '🌸', '✨'];
            heart.innerText = heartsArr[Math.floor(Math.random() * heartsArr.length)];
            
            // Posisi horizontal acak
            heart.style.left = Math.random() * 100 + 'vw';
            
            // Durasi jatuh acak (antara 3 sampai 6 detik)
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            
            document.body.appendChild(heart);

            // Hapus hati setelah selesai jatuh agar memori tidak penuh
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        // Jalankan fungsi membuat hati setiap 400 milidetik
        setInterval(createHeart, 400);
    </script>

</body>
</html>
